name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore TrollRestoreWin/TrollRestoreWin.csproj

    - name: Publish Windows App
      run: |
        dotnet publish TrollRestoreWin/TrollRestoreWin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish/

    - name: Verify Published Files
      shell: pwsh
      run: |
        Get-ChildItem -Path publish/

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestoreWin-x64
        path: publish/
